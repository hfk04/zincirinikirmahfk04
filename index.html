<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zincirini Kırma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0D0D0D;
      --bg2: #161616;
      --bg3: #1F1F1F;
      --card: #1A1A1A;
      --border: #2A2A2A;
      --text: #F0EDE8;
      --text2: #888;
      --text3: #555;
      --gold: #F5C842;
      --gold2: #E8A820;
      --green: #3DD68C;
      --shadow: rgba(0,0,0,0.6);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }
    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      padding: 0 20px; display: flex; align-items: stretch;
      justify-content: space-between; min-height: 64px;
    }
    .logo-block { display: flex; flex-direction: column; justify-content: center; gap: 1px; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--text); line-height: 1; }
    .logo em { color: var(--gold); font-style: normal; }
    .logo-sub { font-size: 10px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); }
    .header-right { display: flex; align-items: center; gap: 8px; }
    nav {
      display: flex; background: var(--bg2); border-bottom: 1px solid var(--border);
      position: sticky; top: 64px; z-index: 99;
    }
    .nav-btn {
      flex: 1; padding: 14px 8px; background: transparent; border: none;
      color: var(--text3); font-family: 'Outfit', sans-serif; font-size: 12px;
      font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
      transition: all 0.2s; position: relative;
    }
    .nav-btn.active { color: var(--gold); }
    .nav-btn.active::after {
      content: ''; position: absolute; bottom: 0; left: 16px; right: 16px;
      height: 2px; background: var(--gold); border-radius: 2px 2px 0 0;
    }
    main { max-width: 680px; margin: 0 auto; padding: 28px 16px 120px; position: relative; }
    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg3); color: var(--text); padding: 12px 20px;
      border-radius: 8px; font-size: 13px; font-weight: 600; z-index: 999;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap; border: 1px solid var(--border);
      border-left: 3px solid var(--gold); box-shadow: 0 12px 40px var(--shadow);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; gap: 20px; }
    .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--text3); }
    .section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 24px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 2px; line-height: 1; color: var(--text); }
    .section-sub { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
    .date-strip {
      background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    }
    .date-label { font-size: 13px; font-weight: 600; color: var(--text2); text-transform: capitalize; }
    .date-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .day-nav-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text2);
      width: 36px; height: 36px; border-radius: 6px; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0;
    }
    .day-nav-btn:hover { border-color: var(--gold); color: var(--gold); }
    .date-picker-btn {
      background: transparent; border: 1px solid var(--border); color: var(--text2);
      padding: 5px 12px; border-radius: 5px; font-family: 'Outfit', sans-serif;
      font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
    }
    .date-picker-btn:hover { border-color: var(--gold); color: var(--gold); }
    .date-picker-btn.past { border-color: var(--gold2); color: var(--gold2); background: rgba(245,200,66,0.08); }
    input[type="date"] {
      background: var(--bg3); border: 1px solid var(--gold); border-radius: 6px;
      padding: 6px 10px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 13px; outline: none; color-scheme: dark;
    }
    .day-progress { margin-bottom: 20px; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .progress-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); }
    .progress-pct { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--gold); }
    .progress-track { height: 4px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold2), var(--gold)); border-radius: 4px; transition: width 0.6s cubic-bezier(0.34,1.2,0.64,1); }
    .habit-list { display: flex; flex-direction: column; gap: 8px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .habit-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; display: flex; flex-direction: column;
      transition: all 0.15s; animation: fadeUp 0.3s ease both; position: relative; overflow: hidden;
    }
    .habit-card.done { border-color: color-mix(in srgb, var(--habit-color) 30%, var(--border)); background: color-mix(in srgb, var(--habit-color) 6%, var(--card)); }
    .habit-card::after { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--habit-color); border-radius: 3px 0 0 3px; }
    .habit-card-top { display: flex; align-items: center; gap: 14px; }
    .check-btn {
      width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--habit-color);
      background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 17px; transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1); flex-shrink: 0; color: #fff;
    }
    .check-btn.done { background: var(--habit-color); box-shadow: 0 0 16px color-mix(in srgb, var(--habit-color) 50%, transparent); }
    .habit-info { flex: 1; min-width: 0; }
    .habit-name { font-size: 15px; font-weight: 600; color: var(--text); transition: all 0.2s; }
    .habit-card.done .habit-name { text-decoration: line-through; color: var(--text3); }
    .habit-note { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .habit-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .streak-pill { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; color: var(--habit-color); min-width: 40px; text-align: right; }
    .icon-btn { background: transparent; border: none; cursor: pointer; font-size: 15px; padding: 4px; opacity: 0.4; transition: opacity 0.15s; }
    .icon-btn:hover { opacity: 1; }
    .habit-motiv { font-size: 11px; color: var(--text3); margin-top: 6px; padding-left: 52px; font-style: italic; }
    .add-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-top: 10px; animation: fadeUp 0.2s ease; }
    .field-label { font-size: 10px; font-weight: 800; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
    input[type="text"], input[type="email"] {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 14px; font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; margin-bottom: 12px;
    }
    input[type="text"]:focus, input[type="email"]:focus { border-color: var(--gold); }
    .btn-row { display: flex; gap: 8px; }
    .btn-primary {
      background: var(--gold); color: #000; border: none; padding: 10px 22px; border-radius: 6px;
      font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: all 0.15s;
    }
    .btn-primary:hover { background: var(--gold2); }
    .btn-secondary {
      background: transparent; color: var(--text3); border: 1px solid var(--border); padding: 10px 18px;
      border-radius: 6px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn-secondary:hover { border-color: var(--text2); color: var(--text2); }
    .add-new-btn {
      width: 100%; margin-top: 10px; padding: 14px; background: transparent;
      border: 1px dashed var(--border); border-radius: 10px; color: var(--text3);
      font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .add-new-btn:hover { border-color: var(--gold); color: var(--gold); }
    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-icon { font-size: 52px; margin-bottom: 16px; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--text2); margin-bottom: 6px; }
    .empty-sub { font-size: 13px; color: var(--text3); }
    .cal-habit-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 18px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .cal-habit-scroll::-webkit-scrollbar { display: none; }
    .cal-chip { flex-shrink: 0; padding: 7px 16px; border-radius: 20px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px; white-space: nowrap; }
    .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .month-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--text); }
    .month-arrow { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); width: 36px; height: 36px; border-radius: 6px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
    .month-arrow:hover { border-color: var(--gold); color: var(--gold); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
    .cal-hdr { text-align: center; font-size: 10px; font-weight: 800; letter-spacing: 1.5px; color: var(--text3); padding: 4px 0 10px; }
    .cal-day { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: all 0.12s; background: var(--bg3); color: var(--text3); flex-direction: column; gap: 2px; }
    .cal-day:hover:not(.empty) { border-color: var(--gold); color: var(--text); }
    .cal-day.empty { background: transparent; cursor: default; }
    .cal-day.today { border-color: var(--gold) !important; color: var(--text) !important; font-weight: 800; }
    .cal-day.done { color: #000 !important; }
    .cal-day-headers { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 4px; }
    .cal-canvas-wrap { position: relative; width: 100%; }
    .cal-canvas-wrap canvas { display: block; width: 100%; }
    .cal-click-layer {
      position: absolute; top: 0; left: 0;
      display: grid; grid-template-columns: repeat(7,1fr);
      pointer-events: none;
    }
    .cal-click-cell {
      background: transparent; border: none; cursor: pointer;
      pointer-events: all;
    }
    .cal-click-cell:hover { background: rgba(245,200,66,0.05); }
    .cal-day { position: relative; z-index: 1; background: var(--bg3); }
    .cal-day-num { font-size: 12px; font-weight: 600; }
    .cal-dots { display: flex; flex-wrap: wrap; gap: 2px; justify-content: center; padding: 0 2px; margin-top: 2px; }
    .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
    .cal-tip { margin-top: 12px; padding: 10px 14px; background: var(--bg3); border-radius: 6px; font-size: 11px; color: var(--text3); }
    .stats-grid { display: flex; flex-direction: column; gap: 10px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; animation: fadeUp 0.3s ease both; }
    .stat-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .stat-name { font-size: 16px; font-weight: 700; color: var(--text); }
    .stat-boxes { display: flex; gap: 8px; margin-bottom: 12px; }
    .stat-box { flex: 1; background: var(--bg3); border-radius: 8px; padding: 12px 8px; text-align: center; }
    .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; color: var(--habit-color); line-height: 1; }
    .stat-lbl { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-top: 3px; }
    .stat-progress { height: 4px; background: var(--bg3); border-radius: 4px; overflow: hidden; margin-bottom: 10px; }
    .stat-fill { height: 100%; border-radius: 4px; transition: width 0.7s cubic-bezier(0.34,1.2,0.64,1); }
    .stat-motiv { font-size: 12px; color: var(--text3); font-style: italic; }
    .stat-note { margin-top: 10px; padding: 8px 12px; background: var(--bg3); border-radius: 6px; font-size: 12px; color: var(--text3); }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 16px; }
    .summary-box { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 16px 12px; text-align: center; }
    .summary-val { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 1px; color: var(--gold); line-height: 1; }
    .summary-lbl { font-size: 9px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--text3); margin-top: 4px; }
    .btn-sm { padding: 8px 14px !important; font-size: 11px !important; }
  </style>
</head>
<body>

<header>
  <div class="logo-block">
    <div class="logo">⛓ ZİNCİRİNİ <em>KIRMA</em></div>
    <div class="logo-sub" id="headerDate"></div>
  </div>
  <div class="header-right">
  </div>
</header>

<nav>
  <button class="nav-btn active" onclick="switchView('today')" id="nav-today">🌅 BUGÜN</button>
  <button class="nav-btn" onclick="switchView('calendar')" id="nav-calendar">📅 TAKVİM</button>
  <button class="nav-btn" onclick="switchView('stats')" id="nav-stats">📊 STATS</button>
</nav>

<main id="main"></main>
<div class="toast" id="toast"></div>

<script>
const API = "https://script.google.com/macros/s/AKfycbz1aKhGVIeXewPQZYHF2uN_dXYTPtlP7PYT08sXS5mrBMstJV2BpuDtBHIDaLRiBp1x/exec";

const COLORS = ["#F5C842","#E84040","#3DD68C","#60A5FA","#F97316","#C084FC","#FB7185"];
const MONTHS = ["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"];
const DAYS_TR = ["Pt","Sa","Ça","Pe","Cu","Ct","Pz"];
const MOTIVATIONS = [
  {min:0,  msg:"Bugün başla, yarın fark et 🌱"},
  {min:1,  msg:"İlk halka kilitlendi! Devam et 🔗"},
  {min:3,  msg:"3 gün! Beyin alışıyor ⚡"},
  {min:7,  msg:"Bir hafta! Zincir uzuyor 🔥"},
  {min:14, msg:"İki hafta! Alışkanlık kök salıyor 💪"},
  {min:21, msg:"21 gün! Artık kimse durduramaz 🧠"},
  {min:30, msg:"Bir ay! Sen bu alışkanlıksın 👑"},
  {min:66, msg:"66 gün! Otomatik pilot devrede 🚀"},
  {min:100,msg:"100 GÜN. Efsane oldun 💎"},
];

let state = {
  habits: [], completions: {},
  view: "today",
  selectedDate: todayKey(),
  showAdd: false,
  showDatePicker: false,
  calYear: new Date().getFullYear(),
  calMonth: new Date().getMonth(),
  calSelected: null,
  loading: true,
};

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}
function dateKey(y,m,d) { return `${y}-${pad(m+1)}-${pad(d)}`; }
function pad(n) { return String(n).padStart(2,"0"); }
function formatDateTR(dk) {
  const [y,m,d] = dk.split("-");
  return new Date(parseInt(y),parseInt(m)-1,parseInt(d)).toLocaleDateString("tr-TR",{weekday:"long",day:"numeric",month:"long"});
}
function getMotiv(s) { return ([...MOTIVATIONS].sort((a,b)=>b.min-a.min).find(m=>s>=m.min)||MOTIVATIONS[0]).msg; }
function calcStreak(dates) {
  if (!dates?.length) return 0;
  const sorted = [...dates].sort().reverse();
  const d = new Date(); d.setDate(d.getDate()-1);
  const yest = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  if (sorted[0]!==todayKey()&&sorted[0]!==yest) return 0;
  let s=0, cur=new Date(sorted[0]);
  for (const ds of sorted) { const dd=new Date(ds); if(Math.round((cur-dd)/86400000)>1)break; s++; cur=dd; }
  return s;
}
function calcLongest(dates) {
  if (!dates?.length) return 0;
  const sorted=[...dates].sort(); let max=1,cur=1;
  for(let i=1;i<sorted.length;i++){const d=Math.round((new Date(sorted[i])-new Date(sorted[i-1]))/86400000);if(d===1){cur++;max=Math.max(max,cur);}else cur=1;}
  return max;
}
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function showToast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3500);}

async function apiGet(action,params=""){const r=await fetch(`${API}?action=${action}${params}`);return r.json();}
async function apiPost(action,data){const r=await fetch(`${API}?action=${action}`,{method:"POST",body:JSON.stringify(data)});return r.json();}

async function loadData() {
  state.loading=true; render();
  try {
    const r = await apiGet("getAll");
    state.habits = r.habits || [];
    state.completions = r.completions || {};
  } catch(e){ showToast("Bağlantı hatası!"); }
  state.loading=false; render();
}

async function addHabit(name,note) {
  const colorIdx=state.habits.length%COLORS.length;
  const h={id:Date.now().toString(),name,note:note||"",colorIdx};
  state.habits.push(h); state.showAdd=false; render();
  await apiPost("addHabit",{...h, apiKey:"hfk04"});
  showToast(`"${name}" eklendi! 🎯`);
}

async function deleteHabit(id) {
  if(!confirm("Bu alışkanlığı silmek istediğine emin misin?"))return;
  state.habits=state.habits.filter(h=>h.id!==id);
  delete state.completions[id];
  if(state.calSelected===id)state.calSelected=null;
  render();
  await apiGet("deleteHabit",`&id=${id}&apiKey=hfk04`);
  showToast("Silindi.");
}

async function toggleDay(habitId,dateStr) {
  const prev=state.completions[habitId]||[];
  const adding=!prev.includes(dateStr);
  state.completions[habitId]=adding?[...prev,dateStr]:prev.filter(d=>d!==dateStr);
  render();
  await apiPost("toggleCompletion",{habitId,date:dateStr,apiKey:"hfk04"});
  if(adding)showToast(getMotiv(calcStreak(state.completions[habitId])));
}







function switchView(v){
  state.view=v;state.showAdd=false;
  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));
  document.getElementById(`nav-${v}`).classList.add("active");
  render();
}
function switchToCalendar(id){state.calSelected=id;state.view="calendar";document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));document.getElementById("nav-calendar").classList.add("active");render();}
function shiftDay(delta){
  const d=new Date(state.selectedDate);
  d.setDate(d.getDate()+delta);
  const next=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  if(next<=todayKey()) state.selectedDate=next;
  render();
}
function prevMonth(){state.calMonth--;if(state.calMonth<0){state.calMonth=11;state.calYear--;}render();}
function nextMonth(){state.calMonth++;if(state.calMonth>11){state.calMonth=0;state.calYear++;}render();}


function renderLoading(){return `<div class="loading"><div class="spinner"></div><div class="loading-text">Yükleniyor</div></div>`;}

function renderToday(){
  const sel=state.selectedDate,isToday=sel===todayKey();
  const done=state.habits.filter(h=>(state.completions[h.id]||[]).includes(sel)).length;
  const pct=state.habits.length?Math.round((done/state.habits.length)*100):0;

  let html=`<div class="section-header"><div>
    <div class="section-sub">Günlük Takip</div>
    <div class="section-title">${isToday?"BUGÜN":"GEÇMİŞ GÜN"}</div>
  </div></div>`;

  html+=`<div class="date-strip">
    <button class="day-nav-btn" onclick="shiftDay(-1)">‹</button>
    <div style="flex:1;text-align:center">
      <div class="date-label">${formatDateTR(sel)}</div>
      ${!isToday?`<div style="font-size:10px;color:var(--gold2);font-weight:700;letter-spacing:1px;margin-top:2px">GEÇMİŞ GÜN</div>`:""}
    </div>
    <button class="day-nav-btn" onclick="shiftDay(1)" ${isToday?"disabled":""} style="${isToday?"opacity:0.2;cursor:default":""}">›</button>
  </div>`;

  if(state.habits.length){
    html+=`<div class="day-progress">
      <div class="progress-header"><div class="progress-label">Günlük İlerleme</div><div class="progress-pct">${pct}%</div></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }

  if(!state.habits.length){
    html+=`<div class="empty-state"><div class="empty-icon">🌱</div><div class="empty-title">BAŞLA</div><div class="empty-sub">İlk alışkanlığını ekle ve zinciri kur.</div></div>`;
  } else {
    html+=`<div class="habit-list">`;
    state.habits.forEach((h,i)=>{
      const color=COLORS[h.colorIdx%COLORS.length];
      const isDone=(state.completions[h.id]||[]).includes(sel);
      const streak=calcStreak(state.completions[h.id]||[]);
      html+=`<div class="habit-card ${isDone?"done":""}" style="--habit-color:${color};animation-delay:${i*0.04}s">
        <div class="habit-card-top">
          <button class="check-btn ${isDone?"done":""}" onclick="toggleDay('${h.id}','${sel}')">${isDone?"✓":""}</button>
          <div class="habit-info">
            <div class="habit-name">${escHtml(h.name)}</div>
            ${h.note?`<div class="habit-note">${escHtml(h.note)}</div>`:""}
          </div>
          <div class="habit-right">
            <span class="streak-pill">🔥${streak}</span>
            <button class="icon-btn" onclick="switchToCalendar('${h.id}')">📅</button>
            <button class="icon-btn" onclick="deleteHabit('${h.id}')">🗑</button>
          </div>
        </div>
        <div class="habit-motiv">${getMotiv(streak)}</div>

      </div>`;
    });
    html+=`</div>`;
  }

  if(state.showAdd){
    html+=`<div class="add-card">
      <div class="field-label">Alışkanlık Adı</div>
      <input type="text" id="newName" placeholder="Örn: Her gün 30 dk okuma..." onkeydown="if(event.key==='Enter')submitAdd()" />
      <div class="field-label">Not (opsiyonel)</div>
      <input type="text" id="newNote" placeholder="Neden önemli?" onkeydown="if(event.key==='Enter')submitAdd()" />
      <div class="btn-row"><button class="btn-primary" onclick="submitAdd()">EKLE</button><button class="btn-secondary" onclick="state.showAdd=false;render()">İptal</button></div>
    </div>`;
  } else if(state.habits.length<7){
    html+=`<button class="add-new-btn" onclick="state.showAdd=true;render()">+ YENİ ALIŞKANLIK</button>`;
  }
  return html;
}

function renderCalendar(){
  const firstDow = new Date(state.calYear, state.calMonth, 1).getDay();
  const dim = new Date(state.calYear, state.calMonth+1, 0).getDate();
  const offset = (firstDow+6)%7;
  const rows = Math.ceil((offset+dim)/7);

  let html = `<div class="section-header"><div><div class="section-sub">Geçmiş</div><div class="section-title">TAKVİM</div></div></div>`;

  // Habit chips
  html += `<div class="cal-habit-scroll">`;
  state.habits.forEach(h => {
    const c = COLORS[h.colorIdx % COLORS.length];
    const a = state.calSelected === h.id;
    html += `<button class="cal-chip" style="background:${a?c:"var(--bg3)"};color:${a?"#000":c};border:1px solid ${a?c:"var(--border)"}" onclick="state.calSelected=state.calSelected==='${h.id}'?null:'${h.id}';render()">${escHtml(h.name)}</button>`;
  });
  html += `</div>`;

  // Month nav
  html += `<div class="month-nav"><button class="month-arrow" onclick="prevMonth()">‹</button><span class="month-title">${MONTHS[state.calMonth]} ${state.calYear}</span><button class="month-arrow" onclick="nextMonth()">›</button></div>`;

  // Day headers
  html += `<div class="cal-day-headers">`;
  DAYS_TR.forEach(d => { html += `<div class="cal-hdr">${d}</div>`; });
  html += `</div>`;

  // Canvas-based calendar
  html += `<div class="cal-canvas-wrap" id="calWrap">
    <canvas id="calCanvas"></canvas>
  </div>`;

  // Invisible click layer
  html += `<div class="cal-click-layer" id="calClickLayer">`;
  for(let i=0;i<offset;i++) html += `<div class="cal-click-cell"></div>`;
  for(let d=1;d<=dim;d++){
    const dk = dateKey(state.calYear, state.calMonth, d);
    html += `<button class="cal-click-cell" onclick="handleCalDayClick('${dk}')"></button>`;
  }
  html += `</div>`;

  if(state.calSelected){
    html += `<div class="cal-tip">💡 Günlere tıklayarak işaret ekle veya kaldır</div>`;
  }

  return html;
}

function handleCalDayClick(dk){
  if(state.calSelected) toggleDay(state.calSelected, dk);
}

function drawCalendar(){
  const wrap = document.getElementById("calWrap");
  const canvas = document.getElementById("calCanvas");
  const clickLayer = document.getElementById("calClickLayer");
  if(!wrap || !canvas) return;

  const W = wrap.offsetWidth;
  const firstDow = new Date(state.calYear, state.calMonth, 1).getDay();
  const dim = new Date(state.calYear, state.calMonth+1, 0).getDate();
  const offset = (firstDow+6)%7;
  const rows = Math.ceil((offset+dim)/7);
  const COLS = 7;
  const cellW = W / COLS;
  const cellH = cellW * 0.75;
  const H = rows * cellH;
  const GAP = 4;

  canvas.width = W;
  canvas.height = H;
  canvas.style.height = H + "px";
  wrap.style.height = H + "px";
  if(clickLayer){
    clickLayer.style.width = W + "px";
    clickLayer.style.height = H + "px";
    clickLayer.style.gridTemplateColumns = `repeat(7, 1fr)`;
    // set cell heights
    clickLayer.querySelectorAll(".cal-click-cell").forEach(el => {
      el.style.height = cellH + "px";
    });
  }

  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,W,H);

  const getCell = (day) => {
    const idx = offset + day - 1;
    const col = idx % COLS;
    const row = Math.floor(idx / COLS);
    const x = col * cellW;
    const y = row * cellH;
    return {x, y, cx: x + cellW/2, cy: y + cellH/2, w: cellW, h: cellH};
  };

  const today = todayKey();

  // Draw cell backgrounds only
  for(let d=1;d<=dim;d++){
    const {x,y,w,h} = getCell(d);
    const dk = dateKey(state.calYear, state.calMonth, d);
    const isToday = dk === today;
    const radius = 10;
    ctx.beginPath();
    ctx.roundRect(x+GAP/2, y+GAP/2, w-GAP, h-GAP, radius);
    ctx.fillStyle = "#1F1F1F";
    ctx.fill();
    if(isToday){
      ctx.beginPath();
      ctx.roundRect(x+GAP/2, y+GAP/2, w-GAP, h-GAP, radius);
      ctx.strokeStyle = "#F5C842";
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  }

  // Draw lines for each habit
  state.habits.forEach((h, hi) => {
    const color = COLORS[h.colorIdx % COLORS.length];
    const dates = state.completions[h.id] || [];
    const total = state.habits.length;
    // vertical offset per habit so they don't stack
    const vOff = total > 1 ? (hi/(total-1) - 0.5) * (cellH * 0.35) : 0;

    const doneDays = [];
    for(let d=1;d<=dim;d++){
      const dk = dateKey(state.calYear, state.calMonth, d);
      if(dates.includes(dk)) doneDays.push(d);
    }
    if(doneDays.length === 0) return;

    // Split into consecutive segments
    const segs = [];
    let seg = [doneDays[0]];
    for(let i=1;i<doneDays.length;i++){
      if(doneDays[i]-doneDays[i-1]===1){ seg.push(doneDays[i]); }
      else { segs.push(seg); seg=[doneDays[i]]; }
    }
    segs.push(seg);

    segs.forEach(seg => {
      const pts = seg.map(d => {
        const c = getCell(d);
        return { x: c.cx, y: c.cy + vOff };
      });

      if(pts.length === 1){
        ctx.beginPath();
        ctx.arc(pts[0].x, pts[0].y, 6, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.fill();
        return;
      }

      // Glow
      ctx.save();
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;

      // Line
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      for(let i=1;i<pts.length;i++){
        const p=pts[i-1], n=pts[i];
        const cpx=(p.x+n.x)/2;
        ctx.bezierCurveTo(cpx,p.y,cpx,n.y,n.x,n.y);
      }
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.stroke();
      ctx.restore();

      // Dots on line
      pts.forEach((pt,i) => {
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, i===pts.length-1?6:4, 0, Math.PI*2);
        ctx.fillStyle = color;
        ctx.strokeStyle = "#0D0D0D";
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
      });
    });
  });

  // Draw day numbers on top of everything
  for(let d=1;d<=dim;d++){
    const {x,y,w,h} = getCell(d);
    const dk = dateKey(state.calYear, state.calMonth, d);
    const isToday = dk === today;
    ctx.font = `${isToday?"700":"500"} ${Math.round(cellH*0.22)}px Outfit, sans-serif`;
    ctx.fillStyle = isToday ? "#F5C842" : "#F0EDE8";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "#0D0D0D";
    ctx.shadowBlur = 4;
    ctx.fillText(d, x+w/2, y+h*0.28);
    ctx.shadowBlur = 0;
  }
}


function renderStats(){
  let html=`<div class="section-header"><div><div class="section-sub">Performans</div><div class="section-title">İSTATİSTİK</div></div></div>`;
  if(!state.habits.length)return html+`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">VERİ YOK</div><div class="empty-sub">Alışkanlık ekledikçe istatistikler burada görünür.</div></div>`;
  html+=`<div class="stats-grid">`;
  state.habits.forEach((h,i)=>{
    const c=COLORS[h.colorIdx%COLORS.length],dates=state.completions[h.id]||[];
    const streak=calcStreak(dates),longest=calcLongest(dates),total=dates.length;
    html+=`<div class="stat-card" style="--habit-color:${c};animation-delay:${i*0.06}s">
      <div class="stat-header"><div class="stat-name">${escHtml(h.name)}</div><span style="font-family:'Bebas Neue';font-size:18px;letter-spacing:1px;color:${c}">🔥${streak}</span></div>
      <div class="stat-boxes">
        <div class="stat-box"><div class="stat-val">${total}</div><div class="stat-lbl">Toplam Gün</div></div>
        <div class="stat-box"><div class="stat-val">${longest}</div><div class="stat-lbl">En Uzun Streak</div></div>
        <div class="stat-box"><div class="stat-val">${streak}</div><div class="stat-lbl">Mevcut Streak</div></div>
      </div>
      <div class="stat-motiv">${getMotiv(streak)}</div>
      ${h.note?`<div class="stat-note">📝 ${escHtml(h.note)}</div>`:""}
    </div>`;
  });
  html+=`</div>`;
  const totalMarks=Object.values(state.completions).reduce((a,v)=>a+v.length,0);
  const doneToday=state.habits.filter(h=>(state.completions[h.id]||[]).includes(todayKey())).length;
  html+=`<div class="summary-grid">
    <div class="summary-box"><div class="summary-val">${state.habits.length}</div><div class="summary-lbl">Alışkanlık</div></div>
    <div class="summary-box"><div class="summary-val">${doneToday}</div><div class="summary-lbl">Bugün Tamam</div></div>
    <div class="summary-box"><div class="summary-val">${totalMarks}</div><div class="summary-lbl">Toplam</div></div>
  </div>`;
  return html;
}

function submitAdd(){
  const name=document.getElementById("newName")?.value?.trim();
  const note=document.getElementById("newNote")?.value?.trim();
  if(!name){showToast("Alışkanlık adı boş olamaz!");return;}
  addHabit(name,note);
}


function render(){
  const d=new Date();
  document.getElementById("headerDate").textContent=d.toLocaleDateString("tr-TR",{weekday:"long",day:"numeric",month:"long",year:"numeric"}).toUpperCase();
  let html="";
  if(state.loading)html=renderLoading();
  else if(state.view==="today")html=renderToday();
  else if(state.view==="calendar")html=renderCalendar();
  else if(state.view==="stats")html=renderStats();
  document.getElementById("main").innerHTML=html;
  if(state.showAdd)setTimeout(()=>document.getElementById("newName")?.focus(),50);
  if(state.showDatePicker)setTimeout(()=>document.getElementById("dpk")?.focus(),50);
  if(state.view==="calendar") setTimeout(drawCalendar, 50);
}

render();
loadData();
window.addEventListener("resize", ()=>{ if(state.view==="calendar") drawCalendar(); });
</script>
